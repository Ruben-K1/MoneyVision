<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>MoneyVision</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:#0d0d14;color:#eeeef8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;}
</style>
</head>
<body>
<div id="root">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;">
    <div style="font-size:52px;margin-bottom:16px">&#128161;</div>
    <div style="font-size:22px;font-weight:900;margin-bottom:8px;">MoneyVision</div>
    <div style="color:#8888aa;font-size:14px;">Wird geladen...</div>
  </div>
</div>
<div id="apib" style="position:fixed;bottom:84px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:440px;background:#1c1c2e;border:1px solid rgba(240,192,96,.4);border-radius:16px;padding:14px;z-index:999;display:none;">
  <p style="font-size:13px;color:#8888aa;margin-bottom:8px;line-height:1.5;">&#129302; API Key eingeben:</p>
  <input id="api-input" type="password" placeholder="sk-ant-..." style="width:100%;background:#0d0d14;border:1px solid #2a2a40;border-radius:10px;padding:10px 12px;color:#eeeef8;font-size:13px;outline:none;margin-bottom:8px;font-family:inherit;display:block;"/>
  <button onclick="saveApiKey()" style="background:#f0c060;border:none;border-radius:10px;padding:9px 18px;font-weight:800;cursor:pointer;font-size:13px;color:#0d0d14;font-family:inherit;">Speichern</button>
</div>

<script>
window.onerror=function(m,s,l,c,e){
  document.getElementById('root').innerHTML='<div style="padding:20px;color:#ff6b6b;font-family:monospace;font-size:13px;white-space:pre-wrap;word-break:break-all;"><b>FEHLER:</b><br>'+m+'<br>Zeile: '+l+'</div>';
};

// Auto-clear old seed data on version change
(function(){
  var V="v2.0";
  if(localStorage.getItem('mv_version')!==V){
    localStorage.removeItem('mv_md');
    localStorage.removeItem('mm_month_data');
    localStorage.removeItem('mv_hb');
    localStorage.removeItem('mm_hasBudget');
    localStorage.setItem('mv_version',V);
  }
})();

function saveApiKey(){var k=document.getElementById('api-input').value.trim();if(k.length>10){localStorage.setItem('mv_ak',k);document.getElementById('apib').style.display='none';}else alert('Bitte gueltigen Key eingeben.');}
function getApiKey(){return localStorage.getItem('mv_ak')||'';}
function showApiBanner(){document.getElementById('apib').style.display='block';}
var useState=React.useState;
var useRef=React.useRef;
var useEffect=React.useEffect;
var useMemo=React.useMemo;
