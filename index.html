<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d0d14;color:#eeeef8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px;}
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
    background:#14141f;border-top:1px solid #2a2a40;display:flex;
    justify-content:space-around;padding:8px 0 18px;z-index:50;}
.nb{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;
    align-items:center;gap:3px;padding:2px 10px;color:#44445a;font-size:10px;font-family:inherit;}
.nb.on{color:#f0c060;}
.nb .ni{font-size:22px;}
.card{background:#1c1c2e;border:1px solid #2a2a40;border-radius:18px;padding:18px;margin-bottom:12px;}
.btn{display:block;border:none;border-radius:14px;padding:13px 18px;font-weight:800;
     font-size:15px;cursor:pointer;width:100%;font-family:inherit;}
.ba{background:#f0c060;color:#0d0d14;}
.bp{background:#1e1e30;color:#8888aa;border:1px solid #2a2a40;}
.bg{background:#3ecf8e;color:#0d0d14;}
.inp{width:100%;background:#14141f;border:1px solid #2a2a40;border-radius:12px;
     padding:12px 14px;color:#eeeef8;font-size:14px;outline:none;font-family:inherit;margin-bottom:8px;}
.inp:focus{border-color:#f0c060;}
.lbl{font-size:11px;font-weight:700;color:#8888aa;letter-spacing:1px;margin-bottom:8px;display:block;}
.bar-w{height:6px;background:#2a2a40;border-radius:6px;overflow:hidden;}
.bar-i{height:100%;border-radius:6px;transition:width .4s;}
.ov{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
    height:100vh;background:#0d0d14;z-index:100;overflow-y:auto;display:none;}
.ov.open{display:block;}
.coach-ov{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
          height:100vh;background:#0d0d14;z-index:100;display:none;flex-direction:column;}
.coach-ov.open{display:flex;}
.tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;}
.hov{cursor:pointer;}
.hov:active{opacity:.75;}
.buser{padding:12px 16px;border-radius:18px 18px 4px 18px;max-width:78%;font-size:14px;
       line-height:1.6;background:#f0c060;color:#0d0d14;font-weight:600;align-self:flex-end;}
.bai{border-radius:18px 18px 18px 4px;padding:12px 16px;max-width:78%;font-size:14px;
     line-height:1.6;background:#1c1c2e;border:1px solid #2a2a40;color:#eeeef8;
     white-space:pre-wrap;align-self:flex-start;}
.dot{width:7px;height:7px;background:#44445a;border-radius:50%;animation:bn 1s infinite;}
@keyframes bn{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fi .2s ease;}
</style>
</head>

function seed(){
  var d={};
  var sps=[[820,350,140,90,30],[780,290,160,130,60],[900,410,155,70,20]];
  sps.forEach(function(sp,i){
    var dt=new Date(now.getFullYear(),now.getMonth()-(2-i),1);
    var key=mk(dt.getFullYear(),dt.getMonth());
    d[key]={income:"2500",cats:CTPL.map(function(c,ci){
      return {id:c.id,e:c.e,l:c.l,budget:c.budget,ex:sp[ci]>0?[{id:ci,nm:"Monatssumme",amt:sp[ci],rec:false}]:[]};
    })};
  });
  return d;
}

function sv(){
  DB.s("mv_dark",ST.dark);DB.s("mv_pro",ST.pro);
  DB.s("mv_done",ST.done);DB.s("mv_xp",ST.xp);
  DB.s("mv_hb",ST.hb);DB.s("mv_md",ST.md);
  DB.s("mv_goals",ST.goals);DB.s("mv_sk",ST.sk);
}
function set(u){Object.assign(ST,u);sv();draw();}

var fmt=function(n){return "\u20AC\u202f"+Number(n).toLocaleString("de-DE");};
var mk=function(y,m){return y+"-"+(m+1<10?"0":"")+(m+1);};
var mkey=function(){return mk(ST.cy,ST.cm);};
var cd=function(){return ST.md[mkey()]||{income:"",cats:[]};};
var cc=function(){return cd().cats||[];};
var ci=function(){return Number(cd().income||0);};
var ts=function(){return cc().reduce(function(s,b){return s+b.ex.reduce(function(a,e){return a+Number(e.amt);},0);},0);};

function updM(u){var k=mkey();var e=ST.md[k]||{income:"",cats:[]};ST.md[k]=Object.assign({},e,u);sv();}
function updC(fn){var k=mkey();var e=ST.md[k]||{income:"",cats:[]};ST.md[k]=Object.assign({},e,{cats:fn(e.cats||[])});sv();}

function actBudget(){
  var k=mkey();
  if(!ST.md[k]||!ST.md[k].cats||ST.md[k].cats.length===0){
    ST.md[k]={income:"2500",cats:CTPL.map(function(c){return {id:c.id,e:c.e,l:c.l,budget:c.budget,ex:[]};})};
  }
  ST.hb=true;sv();
}

function recAct(){
  var t=new Date().toISOString().split("T")[0];
  if(ST.sk.last===t)return;
  ST.sk={n:ST.sk.onIce?ST.sk.n:ST.sk.n+1,last:t,ice:0,onIce:false};sv();
}

(function checkSk(){
  var t=new Date().toISOString().split("T")[0];
  var s=ST.sk;if(!s.last)return;
  var diff=Math.round((new Date(t)-new Date(s.last))/86400000);
  if(diff===0)return;
  if(diff===1&&!s.onIce){var ic=s.ice+1;if(ic>=3)ST.sk={n:0,last:t,ice:0,onIce:false};else ST.sk=Object.assign({},s,{onIce:true,ice:ic});}
  else ST.sk={n:0,last:t,ice:0,onIce:false};sv();
})();

function fsc(){
  var s=0;if(ST.hb)s+=15;
  var inc=ci(),sp=ts();
  if(inc>0){if(sp/inc<0.8)s+=20;else if(sp/inc<1)s+=10;if((inc-sp)/inc>=0.2)s+=20;else if((inc-sp)/inc>=0.1)s+=10;}
  else if(ST.hb)s+=15;
  s+=Math.min(ST.done.length/CRS.length*20,20);
  s+=Math.min(ST.sk.n/30*15,15);
  if(ST.goals.length>0)s+=10;
  return Math.round(Math.min(s,100));
}

function gicon(n){
  n=(n||"").toLowerCase();
  if(/miete|kalt/.test(n))return"\uD83C\uDFE0";
  if(/strom|gas|neben/.test(n))return"\u26A1";
  if(/wasser/.test(n))return"\uD83D\uDEBF";
  if(/internet|wlan/.test(n))return"\uD83C\uDF10";
  if(/netflix|disney|stream/.test(n))return"\uD83C\uDFAC";
  if(/spotify|musik/.test(n))return"\uD83C\uDFB5";
  if(/handy|telefon/.test(n))return"\uD83D\uDCF1";
  if(/rewe|aldi|lidl|edeka|lebensmittel/.test(n))return"\uD83D\uDED2";

function h(tag,attr,children){
  var e=document.createElement(tag);
  if(attr){
    Object.keys(attr).forEach(function(k){
      var v=attr[k];
      if(k==="cls")e.className=v;
      else if(k==="sty")Object.assign(e.style,v);
      else if(k.substr(0,2)==="on")e.addEventListener(k.substr(2),v);
      else e.setAttribute(k,v);
    });
  }
  if(children){
    [].concat(children).forEach(function(c){
      if(c==null)return;
      if(typeof c==="string"||typeof c==="number")e.appendChild(document.createTextNode(String(c)));
      else e.appendChild(c);
    });
  }
  return e;
}

// --- COACH ---
function openCoach(){drawCoach();document.getElementById("cov").classList.add("open");}
function drawCoach(){
  var ov=document.getElementById("cov");ov.innerHTML="";
  ov.appendChild(D({sty:{padding:"28px 20px 12px",display:"flex",justifyContent:"space-between",flexShrink:"0"}},[
    D(null,[D({sty:{fontSize:"24px",fontWeight:"900",letterSpacing:"-.5px"}},"Coach \uD83E\uDD16"),D({sty:{fontSize:"13px",color:"#8888aa",marginTop:"3px"}},"KI-Finanzberater")]),
    D({sty:{fontSize:"11px",color:"#44445a",fontWeight:"700",paddingTop:"6px"}},"MoneyVision")
  ]));
  var msgs=D({sty:{flex:"1",overflowY:"auto",padding:"0 16px 8px",display:"flex",flexDirection:"column",gap:"10px"}});
  ST.msgs.forEach(function(m){
    var row2=D({sty:{display:"flex",justifyContent:m.r==="user"?"flex-end":"flex-start",alignItems:"flex-end",gap:"8px"}});
    if(m.r==="ai")row2.appendChild(S({sty:{fontSize:"22px",flexShrink:"0"}},"\uD83E\uDD16"));
    row2.appendChild(D({cls:m.r==="user"?"buser":"bai"},m.t));
    msgs.appendChild(row2);
  });
  if(ST.typ){
    var tr=D({sty:{display:"flex",alignItems:"flex-end",gap:"8px"}});
    tr.appendChild(S({sty:{fontSize:"22px"}},"\uD83E\uDD16"));
    var tb=D({cls:"bai",sty:{display:"flex",gap:"5px",alignItems:"center"}});
    [0,1,2].forEach(function(i){var d=D({cls:"dot",sty:{animationDelay:i*0.18+"s"}});tb.appendChild(d);});
    tr.appendChild(tb);msgs.appendChild(tr);
  }
  var anch=D(null);msgs.appendChild(anch);
  ov.appendChild(msgs);
  setTimeout(function(){anch.scrollIntoView({behavior:"smooth"});},50);
  var qs=D({sty:{padding:"6px 16px",display:"flex",gap:"8px",overflowX:"auto",flexShrink:"0"}});
  ["ETF Sparplan","Notgroschen","Schulden abbauen","Steuer sparen","Rente aufbauen"].forEach(function(q){
    qs.appendChild(B({sty:{background:"#1e1e30",border:"none",borderRadius:"20px",padding:"7px 14px",color:"#8888aa",fontSize:"12px",cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit",flexShrink:"0"},onclick:function(){var ci=document.getElementById("ci");if(ci)ci.value=q;}},q));
  });
  ov.appendChild(qs);
  var ir=D({sty:{padding:"10px 16px 90px",flexShrink:"0",display:"flex",gap:"8px"}});
  var ci=I({id:"ci",placeholder:"Stell deine Finanzfrage\u2026",cls:"inp",sty:{flex:"1",borderRadius:"14px",marginBottom:"0"}});
  ci.addEventListener("keydown",function(e){if(e.key==="Enter")sendChat();});
  ir.appendChild(ci);
  ir.appendChild(B({sty:{background:A,border:"none",borderRadius:"14px",width:"46px",height:"46px",cursor:"pointer",fontSize:"20px",color:"#0d0d14",flexShrink:"0",fontFamily:"inherit"},onclick:sendChat},"\u2191"));
  ov.appendChild(ir);
}

async function sendChat(){
  var ci=document.getElementById("ci");if(!ci||!ci.value.trim()||ST.typ)return;
  var text=ci.value.trim();ci.value="";
  var key=localStorage.getItem("mv_ak")||"";
  if(!key){document.getElementById("apib").style.display="block";return;}
  ST.msgs=[...ST.msgs,{r:"user",t:text}];ST.typ=true;drawCoach();
  try{
    var msgs2=ST.msgs.map(function(m){return{role:m.r==="user"?"user":"assistant",content:m.t};});
    var res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-allow-browser":"true"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:600,
        system:"Du bist MoneyVision Coach, freundlicher Finanzberater f\u00fcr D/A/CH. Beantworte Fragen zu Budgetierung, Sparen, Investieren, Schulden, Altersvorsorge und Steuern. Deutsch, konkret, max. 4 S\u00e4tze.",
        messages:msgs2})
    });
    var data=await res.json();
    ST.msgs=[...ST.msgs,{r:"ai",t:data.content&&data.content[0]?data.content[0].text:"Fehler."}];
  }catch(e){ST.msgs=[...ST.msgs,{r:"ai",t:"Verbindungsfehler. Bitte erneut versuchen."}];}
  ST.typ=false;drawCoach();
}

// --- MAIN DRAW ---
function draw(){
  var wrap=document.getElementById("app");wrap.innerHTML="";
  document.getElementById("lsov").classList.remove("open");
  document.getElementById("catov").classList.remove("open");
  document.getElementById("cov").classList.remove("open");
  var content=null;
  if(ST.page==="home")content=drawHome();
  else if(ST.page==="courses")content=drawCourses();
  else if(ST.page==="budget")content=drawBudget();
  else if(ST.page==="history")content=drawHistory();
  else if(ST.page==="profile")content=drawProfile();
  else if(ST.page==="coach"){drawNav();openCoach();return;}
  if(content)wrap.appendChild(content);
  drawNav();
}

draw();
